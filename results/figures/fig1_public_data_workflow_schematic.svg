   <g id="text_1">
    <text style="font-weight: 700; font-size: 10.5px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #0b2545" x="15.2352" y="24.934367" transform="rotate(-0 15.2352 24.934367)">Public-data workflow for interpretable anti-TNF response modules in IBD</text>
   </g>
   <g id="text_2">
    <text style="font-size: 6.8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #555555" x="15.2352" y="36.655066" transform="rotate(-0 15.2352 36.655066)">A feasibility gate prevents overinterpretation of single-cell matrices; independent bulk cohorts test baseline mucosal modules.</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 7.3px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #0b2545" x="31.3056" y="73.05508" transform="rotate(-0 31.3056 73.05508)">1. Public resources</text>
   </g>
   <g id="text_4">
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(31.3056 89.451839)">TAURUS / GSE282122</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(31.3056 96.725032)">GSE16879</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(31.3056 103.996772)">GSE23597</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(31.3056 110.693075)">GSE14580 overlap audit</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 7.3px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #0b2545" x="131.7456" y="73.05508" transform="rotate(-0 131.7456 73.05508)">2. TAURUS gate</text>
   </g>
   <g id="text_6">
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(131.7456 88.808589)">216 biopsy libraries scored</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(131.7456 96.697907)">~1M cells audited</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(131.7456 103.385491)">No lineage H5AD in GEO</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 7.3px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #0b2545" x="232.1856" y="73.05508" transform="rotate(-0 232.1856 73.05508)">3. Bulk validation</text>
   </g>
   <g id="text_8">
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(232.1856 89.41551)">Pretreatment modules</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(232.1856 96.725032)">GSE16879: CD + UC</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(232.1856 103.996772)">GSE23597: UC IFX baseline</text>
   </g>
   <g id="text_9">
    <text style="font-weight: 700; font-size: 7.3px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #0b2545" x="328.608" y="73.05508" transform="rotate(-0 328.608 73.05508)">4. Evidence synthesis</text>
   </g>
   <g id="text_10">
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(328.608 89.453292)">Effect sizes + FDR</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(328.608 96.148626)">Overlap audit</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(328.608 103.961897)">Bounded claims</text>
   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 7.4px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #0b2545" x="71.4816" y="156.731402" transform="rotate(-0 71.4816 156.731402)">Whole-biopsy recovery gate</text>
   </g>
   <g id="text_12">
    <text style="font-size: 6px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(71.4816 172.235065)">Recovery toward healthy was computable,</text>
    <text style="font-size: 6px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(71.4816 179.273639)">but did not robustly separate</text>
    <text style="font-size: 6px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(71.4816 186.945026)">remission from non-remission.</text>
   </g>
   <g id="text_13">
    <text style="font-weight: 700; font-size: 5.7px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: middle; fill: #9b1c1c" x="155.8512" y="145.035266" transform="rotate(-0 155.8512 145.035266)">Neutral gate</text>
   </g>
   <g id="text_14">
    <text style="font-weight: 700; font-size: 7.4px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #0b2545" x="232.1856" y="156.731402" transform="rotate(-0 232.1856 156.731402)">Pretreatment module signal</text>
   </g>
   <g id="text_15">
    <text style="font-size: 6px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(232.1856 172.271627)">Responders showed lower inflammatory,</text>
    <text style="font-size: 6px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(232.1856 179.310201)">epithelial-damage and fibroinflammatory</text>
    <text style="font-size: 6px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; fill: #555555" transform="translate(232.1856 186.312213)">activity in public bulk cohorts.</text>
   </g>
   <g id="text_16">
    <text style="font-weight: 700; font-size: 5.7px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: middle; fill: #3c7d3f" x="318.564" y="145.035266" transform="rotate(-0 318.564 145.035266)">Primary evidence</text>
   </g>
   <g id="text_17">
    <text style="font-weight: 700; font-size: 8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #0b2545" x="49.3848" y="233.564539" transform="rotate(-0 49.3848 233.564539)">Defensible conclusion</text>
   </g>
   <g id="text_18">
    <text style="font-size: 6.8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #555555" x="49.3848" y="245.663866" transform="rotate(-0 49.3848 245.663866)">Pretreatment mucosal-state modules, especially lower myeloid inflammation, are associated with later anti-TNF response.</text>
   </g>
   <g id="text_19">
    <text style="font-size: 6.8px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #555555" x="49.3848" y="255.757798" transform="rotate(-0 49.3848 255.757798)">Boundary: current GEO matrices do not support lineage-specific single-cell localization without annotated H5AD data.</text>
   </g>
   <g id="text_20">
    <text style="font-size: 6px; font-family: 'Arial', 'Helvetica', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #6b7280" x="15.2352" y="284.135108" transform="rotate(-0 15.2352 284.135108)">IFX, infliximab; FDR, false-discovery rate; H5AD, annotated AnnData object.</text>
   </g>
  </g>
 </g>
